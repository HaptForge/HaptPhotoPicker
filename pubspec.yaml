name: hapt_photo_picker
description: An Instagram-grade photo picker for Flutter with full token theming, multi-language strings, choreographed haptics, and a pluggable post-processing pipeline.
version: 0.3.0
homepage: https://github.com/HaptForge/HaptPhotoPicker
repository: https://github.com/HaptForge/HaptPhotoPicker
issue_tracker: https://github.com/HaptForge/HaptPhotoPicker/issues
topics:
  - photo-picker
  - image-picker
  - gallery
  - haptic
  - theming

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Underlying media-library access. We wrap its types so consumers
  # never have to import `photo_manager` directly.
  photo_manager: ^3.6.0
  # Pure-Dart image processing. Used by `HaptCropEngine` to apply
  # crop + rotation to the asset bytes on Done — slower than native
  # equivalents but works identically on every platform we ship to
  # (iOS, Android, web). Cropping a 4-MP photo is ~120ms on a
  # mid-tier device; acceptable for the Done-tap interaction.
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
