name: hapt_photo_picker
description: An Instagram-grade photo picker for Flutter with full token theming, multi-language strings, choreographed haptics, and a pluggable post-processing pipeline.
version: 0.1.1
homepage: https://github.com/HaptForge/HaptPhotoPicker
repository: https://github.com/HaptForge/HaptPhotoPicker
issue_tracker: https://github.com/HaptForge/HaptPhotoPicker/issues
topics:
  - photo-picker
  - image-picker
  - gallery
  - haptic
  - theming

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Underlying media-library access. We wrap its types so consumers
  # never have to import `photo_manager` directly.
  photo_manager: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
